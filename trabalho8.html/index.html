<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Fácil - Tarefas JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="booty">
    <div class="box1">
        <h2>Tarefas JS fáceis</h2>
        <div class="fex1">
            <button class="btn" onclick="alert('Mensagem recebida')">Receba mensagem</button>
        </div>
        <div class="fex2">
            <button class="btn" id="botao1" onclick="botao1()">Meu nome</button>
        </div>
        <div class="fex3">
            <button class="btn" id="botao2" onclick="botao2()">Minha idade</button>
        </div>
        <div class="fex4">
            <button class="btn" id="botao3" onclick="botao3()">Mude o texto loco</button>
        </div>
        <div class="fex5">
            <p class="textin" id="textin">Mucho texto loco</p>
            <div>
                <button class="btn" id="botao4" onclick="botao4()">Clique aqui!</button>
                <div>
                    <p class="preso"  id="preso">Azul</p>
                </div>
            </div>
        </div>
        <div class="fex6">
            <button class="btn" id="botao5" onclick="botao5()"><p id="text1">Clique aqui</p></button>
        </div>
        <div class="fex7">
            <button class="btn" id="botao6" onclick="botao6()">Clique aqui</button>
            <p id="text2">Veja-me desaparecer!</p>
        </div>
    </div>
    <div class="box2">
        <h2>Tarefas JS médias</h2>
        <div class="mex1">
            <input class="subput" type="password" id="showtext">
            <button class="btn2" id="show" onclick="show()">Mostrar</button>
            <p id="showed"></p>
        </div>
        <div class="mex2">
            <input class="subputnum" type="number" id="num1">
            <input class="subputnum" type="number" id="num2">
            <p id="result1"></p>
            <button class="btn2" id="soma1" onclick="soma1()">Some</button>
        </div>
        <div class="mex3">
            <button class="btn2" id="bkc" onclick="bkc()">Mude o fundo</button>
            <button class="btn2" id="rtn" onclick="rtn()">Retorne</button>
        </div>

        <div class="mex4">
            <button class="btn" id="mtmn" onclick="mtmn()">Mude de tamanho</button>
            <p id="tmn">Tamanho</p>
        </div>
        <div class="mex5">
            <button class="btn" id="pcor" onclick="pcor()">Mude de cor</button>
            <p id="mcor">Coloridinho</p>
        </div>
        <div class="mex6">
            <button class="btn" id="double" onclick="double()">Dobro ou nada?</button>
            <div class="x" id="first">
                <p id="textchange1">Red</p>
            </div>
            <div class="x" id="second">
                <p id="textchange2">Blue</p>
            </div>
        </div>
        <div class="mex7">
            <button class="btn" id="quintuplets" onclick="quintuplets()">As meninas burras e ricas</button>
            <div class="x" id="ichika">
                <p id="burra1">Burra Nº1</p>
            </div>
            <div class="x" id="nano">
                <p id="burra2">Burra Nº2</p>
            </div>
            <div class="x" id="miku">
                <p id="burra3">Burra Nº3</p>
            </div>
            <div class="x" id="yotsuba">
                <p id="burra4">Burra Nº4</p>
            </div>
            <div class="x" id="itsuki">
                <p id="burra5">Burra Nº5</p>
            </div>
        </div>
    </div>
    <div class="box3">
        <div class="x" id="dex1">
            <button class="btn" id="tri" onclick="tri()">Mude three cosas</button>
            <div id="cosas">
                <p id="minicosas">Cosas to mudar</p>
                <p id="minicosas2">Mas coisas changing</p>
            </div>
        </div>
        <div class="x" id="dex2">
            <input type="password" id="duo">
            <button class="btn" id="bts2" onclick="bts2()">Confirme</button>
            <div id="duos">
                <p id="duo1"></p>
                <p id="duo2"></p>
            </div>
        </div>
        <div class="x" id="dex3">
            <button class="btn" id="sad" onclick="sad()"></button>
            <div id="mudatudo">
                <p id="trans">Não sou homi nem muie</p>
            </div>
        </div>
        <div class="x" id="dex4">
            <button class="btn" id="ddivs" onclick="ddivs()"></button>
            <div class="maior">
                <div id="duas1">
                    <p>Duas</p>
                </div>
                <div id="duas2">
                    <p>Divs</p>
                </div>
            </div>
        </div>
        <div class="x" id="dex5">
            <input type="text" id="textmit">
            <button class="btn" id="copy" onclick="copy()"></button>
            <p id="yuta"></p>
        </div>
        <div class="x" id="dex6">
            <input type="number" id="num3">
            <input type="number" id="num4">
            <p id="result2"></p>
            <button class="btn" id="soma2" onclick="soma2()">Some!</button>
            <button class="btn" id="excluir" onclick="excluir()">Apagar!</button>
            
        </div>
        <div class="x" id="dex7">
            <button class="btn" id="mexe" onclick="mexe()">Baguncinha</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
